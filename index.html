<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>بله برون نیلوفر و شهاب</title>
<style>
body{margin:0;background:linear-gradient(#f8f0df,#fff);font-family:tahoma;text-align:center;overflow:hidden}
.title{margin-top:20px;font-size:28px;color:#8b6b2e}
.envelope{width:340px;height:220px;margin:40px auto;position:relative;cursor:pointer}
.base{position:absolute;inset:0;background:#e8d2a6;border-radius:12px}
.flap{position:absolute;top:0;left:0;right:0;height:110px;background:#dcbf86;transform-origin:top;transition:1.2s}
.open .flap{transform:rotateX(180deg)}
.card{position:absolute;left:15px;right:15px;top:25px;transform:translateY(110px);transition:1.8s}
.open .card{transform:translateY(-240px)}
.card img{width:100%;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,.25)}
.poem{background:#fff8;padding:10px;border-radius:10px;margin-top:10px;font-size:22px}
.btn{display:inline-block;margin-top:12px;padding:10px 18px;background:#c9a34e;color:#fff;text-decoration:none;border-radius:24px}
.flower{position:fixed;top:-40px;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(110vh)}}
</style>
</head>
<body>
<div class="title">به نام آنکه عشق را آفرید</div>

<div class="envelope" id="env">
<div class="base"></div>
<div class="flap"></div>
<div class="card">
<img src="invitation.png">
<div class="poem">
<h3>بله برون نیلوفر و شهاب</h3>
به خود آمدم انگار تویی در من بود<br>
این کمی بیشتر از دل به کسی بستن بود
</div>
<a class="btn" href="https://nshn.ir/6a_bvsokWx41T1" target="_blank">📍 مسیریابی با نشان</a>
</div>
</div>

<audio id="music">
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
for(let i=0;i<25;i++){
 let f=document.createElement('div');
 f.className='flower';
 f.innerHTML='🌸';
 f.style.left=Math.random()*100+'vw';
 f.style.animationDuration=(8+Math.random()*8)+'s';
 document.body.appendChild(f);
}
document.getElementById('env').onclick=function(){
 this.classList.add('open');
 let a=document.getElementById('music');
 a.currentTime=2;
 a.play();
 setTimeout(()=>a.pause(),18000);
}
</script>
</body>
</html>
